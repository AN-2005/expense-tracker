<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Add Expense</title>
</head>
<body class="p-4">

<h1 class="mb-4" th:text="${expense.id == null} ? 'Add Expense' : 'Edit Expense'"></h1>

<form action="/save" method="post" th:object="${expense}" class="row g-3">
    <div class="col-md-6">
        <label class="form-label">Title</label>
        <input type="text" th:field="*{title}" class="form-control" required />
    </div>
    <div class="col-md-6">
        <label class="form-label">Amount</label>
        <input type="number" th:field="*{amount}" class="form-control" min="0" step="0.01" required />
    </div>
    <div class="col-md-6">
        <label class="form-label">Date</label>
        <input type="date" th:field="*{date}" class="form-control" required />
    </div>
    <div class="col-md-6">
        <label class="form-label">Type</label>
        <select th:field="*{type}" class="form-select">
            <option value="INCOME">Income</option>
            <option value="EXPENSE">Expense</option>
        </select>
    </div>
    <div class="mb-3">
    <label for="type" class="form-label">Type</label>
    <select th:field="*{type}" class="form-select">
        <option value="EXPENSE" th:selected="${expense.type=='EXPENSE'}">Expense</option>
        <option value="INCOME" th:selected="${expense.type=='INCOME'}">Income</option>
    </select>
</div>
    <div class="col-md-6">
        <label class="form-label">Category</label>
        <select th:field="*{category}" class="form-select">
            <option value="Food">Food</option>
            <option value="Travel">Travel</option>
            <option value="Shopping">Shopping</option>
            <option value="Rent">Rent</option>
            <option value="Emi">Emi</option>
            
        </select>
    </div>
    <div class="col-12 mt-3">
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

</body>
</html>
