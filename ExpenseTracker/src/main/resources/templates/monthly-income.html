<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Set Monthly Income</title>
</head>
<body class="p-4">

<h2>Set Your Monthly Income</h2>

<form th:action="@{/monthly-income}" method="post">
    <div class="mb-3">
        <label for="monthlyIncome" class="form-label">Monthly Income</label>
        <input type="number" step="0.01" class="form-control" name="monthlyIncome" 
               th:value="${monthlyIncome}" required>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a th:href="@{ / }" class="btn btn-secondary ms-2">Cancel</a>
</form>

</body>
</html>
