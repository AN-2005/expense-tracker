<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        h1, h2, h3 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #36A2EB; color: white; }
        a { text-decoration: none; color: #36A2EB; }
        .charts-container { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 40px; }
        .chart-box { width: 30%; min-width: 300px; margin-bottom: 50px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>Expense Tracker Dashboard</h1>

    <div style="text-align:center; margin-bottom:20px;">
        <h2>Monthly Income: $<span th:text="${monthlyIncome}">0.0</span></h2>
        <h2>Total Expenses: $<span th:text="${expenseTotal}">0.0</span></h2>
        <h2>Balance: $<span th:text="${balance}">0.0</span></h2>
        <a href="/monthly-income">Set Monthly Income</a> | 
        <a href="/add">Add Expense</a> | 
        
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="exp : ${expenses}">
                <td th:text="${exp.id}">1</td>
                <td th:text="${exp.type}">EXPENSE</td>
                <td th:text="${exp.category}">Food</td>
                <td th:text="${exp.amount}">100</td>
                <td th:text="${exp.date}">2026-03-29</td>
                <td>
                    <a th:href="@{/edit/{id}(id=${exp.id})}">Edit</a> | 
                    <a th:href="@{/delete/{id}(id=${exp.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- Charts Section -->
    <div class="charts-container">
        <div class="chart-box">
            <h3>Expenses by Category</h3>
            <canvas id="categoryChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Monthly Expenses</h3>
            <canvas id="monthlyChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Budget vs Spent</h3>
            <canvas id="budgetChart"></canvas>
        </div>
    </div>

    <script th:inline="javascript">
        /* ================== Category Pie Chart ================== */
        var categoryMap = /*[[${categoryTotals}]]*/ {};
        var categoryLabels = Object.keys(categoryMap);
        var categoryValues = Object.values(categoryMap);

        new Chart(document.getElementById('categoryChart').getContext('2d'), {
            type: 'pie',
            data: {
                labels: categoryLabels,
                datasets: [{
                    label: 'Expenses by Category',
                    data: categoryValues,
                    backgroundColor: [
                        '#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40','#8AFF33'
                    ]
                }]
            },
            options: { responsive: true }
        });

        /* ================== Monthly Bar Chart ================== */
        var monthlyMap = /*[[${monthlyTotals}]]*/ {};
        var monthlyLabels = Object.keys(monthlyMap);
        var monthlyValues = Object.values(monthlyMap);

        new Chart(document.getElementById('monthlyChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: monthlyLabels,
                datasets: [{
                    label: 'Monthly Expenses',
                    data: monthlyValues,
                    backgroundColor: '#36A2EB'
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });

        /* ================== Budget vs Spent Doughnut Chart ================== */
        var income = /*[[${monthlyIncome}]]*/ 0;
        var totalExpense = /*[[${expenseTotal}]]*/ 0;
        var balance = income - totalExpense;

        new Chart(document.getElementById('budgetChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['Spent', 'Remaining'],
                datasets: [{
                    data: [totalExpense, balance > 0 ? balance : 0],
                    backgroundColor: ['#FF6384','#36A2EB']
                }]
            },
            options: { responsive: true }
        });
    </script>

</body>
</html>
